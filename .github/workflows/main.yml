# .github/workflows/build.yml
name: Build & Publish Firmware

on:
  push:
    branches: [main]
    paths:
      - "growbox.yaml"
      - "protocol.h"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Required for GitHub Pages deployment from Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.yaml from GitHub Secrets
        run: |
          cat > secrets.yaml <<EOF
          wifi_ssid: "${{ secrets.WIFI_SSID }}"
          wifi_password: "${{ secrets.WIFI_PASSWORD }}"
          EOF

      - name: Build ESPHome firmware
        id: build
        uses: esphome/build-action@v7
        with:
          yaml-file: growbox.yaml
          # Produce a manifest.json that the update: component can consume directly
          complete-manifest: true
          release-url: https://github.com/${{ github.repository }}

      # Normalize the build output to a stable, predictable path so the
      # Stamp's manifest source URL never changes between builds.
      - name: Stage Pages output
        run: |
          mkdir -p output/firmware
          cp -r "${{ steps.build.outputs.name }}"/* output/firmware/
          ls -R output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
